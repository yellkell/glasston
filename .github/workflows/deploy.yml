name: Deploy to GitHub Pages

# Build the Vite app and publish it to GitHub Pages whenever the branch is
# pushed. You can also run it on demand from the Actions tab.
on:
  push:
    branches:
      - main
      - claude/blaston-vr-glassmorphic-MUTIT
  workflow_dispatch:

# Allow this workflow to publish a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only keep the most recent deploy running.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # `vite build` sets base to /glasston/ automatically (see vite.config.ts).
      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
